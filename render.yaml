services:
  - type: web
    name: nanaconnect-backend
    runtime: python
    rootDir: panditji-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn debug_boot:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
